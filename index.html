<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papier Logistik</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-wrapper">
        
        <div class="card stats-card">
            <h2>Lifetime Statistic</h2>
            <div class="stat-row">
                <span>Gesamt erstellte QR-Codes:</span>
                <span id="stat-count">---</span>
            </div>
            <div class="stat-row">
                <span>Gesamtgewicht (kg):</span>
                <span id="stat-weight">---</span>
            </div>
            <div class="stat-row">
                <span>Letzter Eintrag:</span>
                <span id="stat-date">---</span>
            </div>
        </div>

        <div class="card create-card">
            
            <div class="input-group">
                <label for="gewicht">Gewicht (kg)</label>
                <input type="number" id="gewicht" placeholder="z.B. 12.5" step="0.1">
            </div>

            <div class="input-group">
                <label for="datum">Datum</label>
                <input type="date" id="datum">
            </div>

            <div class="input-group">
                <label for="qualitaet">Qualität</label>
                <select id="qualitaet">
                    <option value="" disabled selected>Bitte wählen</option>
                    <option value="hoch">Hochwertig</option>
                    <option value="standard">Standard</option>
                    <option value="niedrig">Minderwertig</option>
                </select>
            </div>

            <button id="btn-create" class="btn btn-neon-green">Create QR Code</button>
        </div>

        <button id="btn-scan" class="btn btn-blue">Scan QR Code</button>

    </div>

    <script src="app.js"></script>
    
</body>
</html>
