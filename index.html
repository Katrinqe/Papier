<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papier Logistik</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Papier Erfassung</h1>
        
        <div class="input-group">
            <label for="gewicht">Gewicht (kg)</label>
            <input type="number" id="gewicht" placeholder="z.B. 12.5" step="0.1">
        </div>

        <div class="input-group">
            <label for="datum">Datum</label>
            <input type="date" id="datum">
        </div>

        <div class="input-group">
            <label for="qualitaet">Qualität</label>
            <select id="qualitaet">
                <option value="" disabled selected>Bitte wählen</option>
                <option value="hoch">Hochwertig</option>
                <option value="standard">Standard</option>
                <option value="niedrig">Minderwertig</option>
            </select>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
