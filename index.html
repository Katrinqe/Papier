<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Papier Logistik</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
<div id="view-main" class="app-wrapper active">
        <header class="main-header">
            <span class="welcome-text">Welcome, <span id="user-name">Nikita</span></span>
        </header>

        <div class="status-card">
            <h2>Aktuelle Lage</h2>
            <div class="stat-grid">
                <div class="stat-item">
                    <span class="stat-label">Packs (QR)</span>
                    <span id="stat-count" class="stat-value">---</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Gesamt (kg)</span>
                    <span id="stat-weight" class="stat-value">---</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Verkauft (kg)</span>
                    <span id="stat-sold" class="stat-value">---</span>
                </div>
            </div>
        </div>

        <div class="action-grid">
            <div class="action-card" onclick="switchView('view-create-form')">
                <span class="action-title">Create new pack</span>
                <div class="action-arrow">→</div>
            </div>
            
            <div class="action-card" onclick="alert('Edit Funktion kommt bald')">
                <span class="action-title">Edit pack</span>
                <div class="action-arrow">→</div>
            </div>

            <div class="action-card" onclick="alert('Verkauf Funktion kommt bald')">
                <span class="action-title">Sell paper</span>
                <div class="action-arrow">→</div>
            </div>

            <div class="action-card" onclick="openHistoryFromDashboard()">
                <span class="action-title">View history</span>
                <div class="action-arrow">→</div>
            </div>
        </div>
    </div>

    <div id="view-create-form" class="app-wrapper">
        <div class="card">
            <h2>Neues Pack erstellen</h2>
            <div class="input-group">
                <label for="gewicht">Gewicht (kg)</label>
                <input type="number" id="gewicht" placeholder="z.B. 12.5" step="0.1">
            </div>
            <div class="input-group">
                <label for="datum">Datum</label>
                <input type="date" id="datum">
            </div>
            <div class="input-group">
                <label for="qualitaet">Qualität</label>
                <select id="qualitaet">
                    <option value="" disabled selected>Bitte wählen</option>
                    <option value="hoch">Hochwertig</option>
                    <option value="standard">Standard</option>
                    <option value="niedrig">Minderwertig</option>
                </select>
            </div>
            <button id="btn-create" class="btn btn-neon-green">QR Code generieren</button>
            <button class="btn btn-blue" style="margin-top: 12px;" onclick="switchView('view-main')">Abbrechen</button>
        </div>
    </div>
    <script src="app.js"></script>
    
</body>
</html>
