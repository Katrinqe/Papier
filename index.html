<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Papier Logistik</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
<div id="view-main" class="app-wrapper active">
        
        <img src="paperlogistcs.jpg" alt="Paper Logistics" class="header-image">

        <div class="card create-card">
            <div class="input-group">
                <label for="gewicht">Gewicht (kg)</label>
                <input type="number" id="gewicht" placeholder="z.B. 12.5" step="0.1">
            </div>

            <div class="input-group">
                <label for="datum">Datum</label>
                <input type="date" id="datum">
            </div>

            <div class="input-group">
                <label for="qualitaet">Qualität</label>
                <select id="qualitaet">
                    <option value="" disabled selected>Bitte wählen</option>
                    <option value="hoch">Hochwertig</option>
                    <option value="standard">Standard</option>
                    <option value="niedrig">Minderwertig</option>
                </select>
            </div>

            <button id="btn-create" class="btn btn-neon-green">Create QR Code</button>
        </div>

        <button id="btn-scan" class="btn btn-blue">Scan QR Code</button>
    </div>

<div id="view-qr" class="app-wrapper">
        <div class="card">
            <h2>Dein QR-Code</h2>
            <div style="display: flex; justify-content: center; margin: 20px 0;">
                <canvas id="qr-canvas"></canvas>
            </div>
            <button id="btn-save-qr" class="btn btn-neon-green">In Galerie speichern</button>
            <button id="btn-save-history" class="btn btn-neon-green" style="margin-top: 12px; background-color: #10b981; color: white;">In Historie speichern</button>
            <button id="btn-back-from-qr" class="btn btn-blue" style="margin-top: 12px;">Zurück</button>
        </div>
    </div>

    <div id="view-scanner" class="app-wrapper">
        <div class="card">
            <h2>Code Scannen</h2>
            <div id="reader" style="width: 100%; margin-bottom: 20px;"></div>
            <button id="btn-cancel-scan" class="btn btn-blue">Abbrechen</button>
        </div>
    </div>

    <div id="view-scan-result" class="app-wrapper">
        <div class="card">
            <h2>Gescannte Daten</h2>
            <div class="stat-row"><span>Gewicht:</span><span id="res-gewicht"></span></div>
            <div class="stat-row"><span>Datum:</span><span id="res-datum"></span></div>
            <div class="stat-row"><span>Qualität:</span><span id="res-qualitaet"></span></div>
            <button id="btn-back-from-res" class="btn btn-blue" style="margin-top: 24px;">Zurück zum Menü</button>
        </div>
    </div>

    <div id="view-history" class="app-wrapper">
        <h2 style="text-align: center; margin-bottom: 16px;">Deine Historie</h2>
        <div id="history-list" style="width: 100%; display: flex; flex-direction: column; gap: 12px;">
            </div>
    </div>

    <div id="view-history-detail" class="app-wrapper">
        <div class="card">
            <h2>Eintrag Details</h2>
            <div style="display: flex; justify-content: center; margin: 20px 0;">
                <img id="detail-qr-img" src="" alt="QR Code" style="width: 200px; height: 200px; border-radius: 8px; border: 1px solid #e5e7eb;">
            </div>
            <div class="stat-row"><span>Gewicht:</span><span id="detail-gewicht"></span></div>
            <div class="stat-row"><span>Datum:</span><span id="detail-datum"></span></div>
            <div class="stat-row"><span>Qualität:</span><span id="detail-qualitaet"></span></div>

            <button id="btn-detail-save" class="btn btn-neon-green" style="margin-top: 24px;">In Galerie speichern</button>
            <button id="btn-detail-delete" class="btn btn-neon-green" style="margin-top: 12px; background-color: #ef4444; color: white; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);">Eintrag löschen</button>
            <button id="btn-detail-back" class="btn btn-blue" style="margin-top: 12px;">Zurück</button>
        </div>
    </div>
     
    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </div>
        <div class="nav-item" id="nav-history">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <span>Historie</span>
        </div>
    </nav>
    <script src="app.js"></script>
    
</body>
</html>
